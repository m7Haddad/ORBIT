# ORBIT Mosquitto configuration.
# Auth/ACLs are handled entirely by the dynamic-security plugin: one client per
# device (provisioned at registration by the backend over
# $CONTROL/dynamic-security/v1), plus the orbit-backend service account and the
# dynsec admin (bootstrapped by infra/mosquitto/gen-dynsec.sh). Anonymous
# connections are rejected; dynsec is default-deny.
#
# dynamic-security.json lives on the data volume (NOT a read-only bind mount)
# because the plugin rewrites it on every provisioning change.

persistence true
persistence_location /mosquitto/data/

log_dest stdout

listener 1883
allow_anonymous false

plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json
